<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furbis Design — Мягкая мебель на заказ в Смоленске</title>
    <meta name="description" content="Изготовление премиальных диванов, кроватей и мягкой мебели по индивидуальным размерам. Собственное производство в Смоленске.">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0d0f12;
            --surface: #161a1f;
            --surface2: #1e232a;
            --accent: #3b82f6;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(255,255,255,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); font-family: 'Golos Text', sans-serif; line-height: 1.6; }
        h1, h2, h3, .unbounded { font-family: 'Unbounded', sans-serif; text-transform: uppercase; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* Sticky Header */
        header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(13, 15, 18, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .header-inner { display: flex; justify-content: space-between; align-items: center; height: 80px; }
        .logo { font-family: 'Unbounded'; font-weight: 700; font-size: 20px; text-decoration: none; color: #fff; }
        .nav { display: flex; align-items: center; }
        .nav-links a { margin-left: 20px; text-decoration: none; color: var(--muted); font-size: 13px; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        .btn-sm { padding: 8px 16px; border-radius: 8px; font-size: 11px; font-family: 'Unbounded'; font-weight: 700; text-decoration: none; transition: 0.3s; }
        .btn-tg { background: #229ED9; color: #fff; margin-left: 20px; }
        .btn-max { background: #fff; color: #000; margin-left: 10px; }

        /* Hero */
        .hero { padding: 180px 0 100px; text-align: center; }
        .hero-label { color: var(--accent); font-weight: 700; margin-bottom: 20px; letter-spacing: 0.1em; font-size: 12px; }
        .hero h1 { font-size: clamp(32px, 8vw, 60px); line-height: 1.1; margin-bottom: 24px; }
        .hero p { max-width: 650px; margin: 0 auto 40px; color: var(--muted); font-size: 18px; }

        .btn {
            display: inline-block; padding: 18px 32px; background: var(--accent); color: #fff;
            text-decoration: none; border-radius: 12px; font-weight: 700; font-family: 'Unbounded';
            font-size: 13px; transition: 0.3s; border: none; cursor: pointer; text-align: center;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .btn-white { background: #fff; color: #000; margin-left: 10px; }

        /* Sections */
        .section { padding: 100px 0; }
        .section-title { margin-bottom: 60px; }
        .section-title h2 { font-size: 28px; margin-bottom: 12px; }

        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .project-card { background: var(--surface); border-radius: 24px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; }
        .project-img { width: 100%; height: 400px; background: #1e232a; object-fit: cover; }
        .project-info { padding: 25px; }

        .cta-box { background: var(--surface); border: 1px solid var(--accent); padding: 80px 40px; border-radius: 32px; text-align: center; }

        footer { padding: 60px 0; text-align: center; border-top: 1px solid var(--border); color: var(--muted); font-size: 13px; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero-btns { display: flex; flex-direction: column; gap: 15px; align-items: center; }
            .btn-white { margin-left: 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="container header-inner">
        <a href="#" class="logo">FURBIS <span style="color: var(--accent);">DESIGN</span></a>
        <nav class="nav">
            <div class="nav
